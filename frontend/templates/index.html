<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kripto Strateji</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-mark"></div>
      <span class="logo-text">Kripto Strateji</span>
    </div>
    <div class="auth-tabs">
      <button class="atab active" data-tab="login">Giriş Yap</button>
      <button class="atab" data-tab="register">Kayıt Ol</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ornek@email.com" required>
      </div>
      <div class="field">
        <label>Şifre</label>
        <input type="password" id="login-password" placeholder="••••••" required>
      </div>
      <div id="login-error" class="form-error hidden"></div>
      <button type="submit" class="btn-primary" id="login-btn">Giriş Yap</button>
    </form>

    <form id="register-form" class="auth-form hidden">
      <div class="field">
        <label>Kullanıcı Adı</label>
        <input type="text" id="reg-username" placeholder="kullaniciadi" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ornek@email.com" required>
      </div>
      <div class="field">
        <label>Şifre</label>
        <input type="password" id="reg-password" placeholder="En az 6 karakter" required>
      </div>
      <div id="reg-error" class="form-error hidden"></div>
      <button type="submit" class="btn-primary" id="reg-btn">Kayıt Ol</button>
    </form>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <div class="logo-mark sm"></div>
        <span class="logo-text">Kripto Strateji</span>
      </div>
      <nav class="sidenav">
        <button class="navitem active" data-page="dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Pano
        </button>
        <button class="navitem" data-page="strategy">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Strateji
        </button>
        <button class="navitem" data-page="watchlist">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
          İzleme Listesi
        </button>
        <button class="navitem" data-page="profile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profil
        </button>
      </nav>
    </div>
    <div class="sidebar-bottom">
      <div class="user-info" id="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">—</div>
        <div>
          <div class="user-name" id="sidebar-name">—</div>
          <div class="user-email" id="sidebar-email">—</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn">Çıkış</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-strategy" class="page"></div>
    <div id="page-watchlist" class="page"></div>
    <div id="page-profile" class="page"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Başlık</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/chart-engine.js"></script>
<script src="/static/js/pages.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
